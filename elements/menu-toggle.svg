<svg xmlns="http://www.w3.org/2000/svg" width="240" height="150" viewBox="0 0 240 150" role="img" aria-labelledby="title desc">
  <title id="title">Menu Toggle</title>
  <desc id="desc">Opens and closes the main tool menu.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#eef6f8" />
    </linearGradient>
  </defs>
  <rect width="240" height="150" rx="24" fill="url(#bg)" />
  <rect x="62" y="24" width="116" height="82" rx="18" fill="#04B7E4" />
  <rect x="62" y="24" width="116" height="82" rx="18" fill="none" stroke="#0f171a" stroke-opacity="0.08" />
  <text x="120" y="72" text-anchor="middle" fill="#ffffff" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700">MENU</text>
  <text x="120" y="127" text-anchor="middle" fill="#162126" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="700">Menu Toggle</text>
</svg>
